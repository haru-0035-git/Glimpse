spring.datasource.url=jdbc:mysql://localhost:3308/glimpse_db
spring.datasource.username=glimpse_user
spring.datasource.password=glimpse_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

app.auth.cookie-name=${AUTH_COOKIE_NAME:GLIMPSE_AUTH}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}

app.security.login.max-failures=${LOGIN_MAX_FAILURES:5}
app.security.login.window-ms=${LOGIN_WINDOW_MS:900000}
app.security.login.lockout-ms=${LOGIN_LOCKOUT_MS:900000}

spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:5MB}

app.upload.dir=${UPLOAD_DIR:uploads}
app.upload.public-path=/uploads
app.upload.max-file-size-bytes=${UPLOAD_MAX_FILE_SIZE_BYTES:5242880}
